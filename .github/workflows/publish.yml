    plugin-release:
        name: Build Plugin & Create Release
        runs-on: ubuntu-latest
        needs: [publish]
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: wordpress-plugin/package-lock.json

            - name: Install root npm dependencies
              run: npm ci

            - name: Install npm dependencies
              run: npm ci
              working-directory: wordpress-plugin

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist
              working-directory: wordpress-plugin

            - name: Build
              run: npm run build
              working-directory: wordpress-plugin

            - name: Install WP-CLI
              run: |
                  curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli-nightly.phar
                  chmod +x wp-cli-nightly.phar
                  sudo mv wp-cli-nightly.phar /usr/local/bin/wp

            - name: Install dist-archive command
              run: wp package install wp-cli/dist-archive-command

            - name: Build distribution zip
              run: wp dist-archive --plugin-dirname=claudaborative-editing wordpress-plugin claudaborative-editing-plugin.zip

            - name: Extract changelog for this version
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  NOTES=$(awk -v ver="$VERSION" '
                    /^= / { if (found) exit; if ($0 == "= " ver " =") found=1; next }
                    found { print }
                  ' wordpress-plugin/readme.txt)
                  echo "$NOTES" > release-notes.txt
                  cat release-notes.txt

            - uses: actions/download-artifact@v4
              with:
                  name: npm-tarball

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                    --title "$GITHUB_REF_NAME" \
                    --notes-file release-notes.txt \
                    claudaborative-editing-plugin.zip \
                    claudaborative-editing-*.tgz
