name: Publish

on:
    push:
        branches: [main]
        tags:
            - 'v*'

concurrency:
    group: publish-${{ github.ref }}
    cancel-in-progress: true

permissions:
    id-token: write
    contents: write

jobs:
    canary:
        if: github.ref_type == 'branch'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci
            - run: npm --prefix wordpress-plugin ci

            - name: Compute canary version
              id: version
              run: |
                  CURRENT=$(node -p "require('./package.json').version")
                  NEXT_PATCH=$(node -p "
                    const [major, minor, patch] = '${CURRENT}'.split('.').map(Number);
                    \`\${major}.\${minor}.\${patch + 1}\`
                  ")
                  SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
                  CANARY_VERSION="${NEXT_PATCH}-canary.${SHORT_SHA}"
                  echo "canary_version=${CANARY_VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Publishing canary version: ${CANARY_VERSION}"

            - name: Set canary version
              run: npm version "${{ steps.version.outputs.canary_version }}" --no-git-tag-version

            - run: npm run build
            - run: npm publish --tag canary

    publish:
        if: github.ref_type == 'tag'
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci
            - run: npm --prefix wordpress-plugin ci
            - run: npm run typecheck
            - run: npm run build
            - run: npm test
            - run: npm publish
            - run: npm pack
            - uses: actions/upload-artifact@v4
              with:
                  name: npm-tarball
                  path: claudaborative-editing-*.tgz

    wporg-deploy:
        if: github.ref_type == 'tag'
        name: Deploy to WordPress.org
        runs-on: ubuntu-latest
        needs: [publish]

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: wordpress-plugin/package-lock.json

            - name: Install root npm dependencies
              run: npm ci

            - name: Install npm dependencies
              run: npm ci
              working-directory: wordpress-plugin

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist
              working-directory: wordpress-plugin

            - name: Build
              run: npm run build
              working-directory: wordpress-plugin

            - name: Deploy to WordPress.org
              uses: 10up/action-wordpress-plugin-deploy@stable
              env:
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  BUILD_DIR: wordpress-plugin
                  ASSETS_DIR: wordpress-plugin/.wordpress-org
                  SLUG: claudaborative-editing

    plugin-release:
        if: github.ref_type == 'tag'
        name: Build Plugin & Create Release
        runs-on: ubuntu-latest
        needs: [publish]
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: wordpress-plugin/package-lock.json

            - name: Install root npm dependencies
              run: npm ci

            - name: Install npm dependencies
              run: npm ci
              working-directory: wordpress-plugin

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist
              working-directory: wordpress-plugin

            - name: Build
              run: npm run build
              working-directory: wordpress-plugin

            - name: Install WP-CLI
              run: |
                  curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli-nightly.phar
                  chmod +x wp-cli-nightly.phar
                  sudo mv wp-cli-nightly.phar /usr/local/bin/wp

            - name: Install dist-archive command
              run: wp package install wp-cli/dist-archive-command

            - name: Build distribution zip
              run: wp dist-archive --plugin-dirname=claudaborative-editing wordpress-plugin claudaborative-editing-plugin.zip

            - name: Extract changelog for this version
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  NOTES=$(awk -v ver="$VERSION" '
                    /^= / { if (found) exit; if ($0 == "= " ver " =") found=1; next }
                    found { print }
                  ' wordpress-plugin/readme.txt)
                  echo "$NOTES" > release-notes.txt
                  cat release-notes.txt

            - uses: actions/download-artifact@v4
              with:
                  name: npm-tarball

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                    --title "$GITHUB_REF_NAME" \
                    --notes-file release-notes.txt \
                    claudaborative-editing-plugin.zip \
                    claudaborative-editing-*.tgz
