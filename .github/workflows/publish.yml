name: Publish

on:
    push:
        tags:
            - 'v*'

permissions:
    id-token: write
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci
            - run: npm run typecheck
            - run: npm run build
            - run: npm test
            - run: npm publish --provenance

    plugin-release:
        name: Build Plugin & Create Release
        runs-on: ubuntu-latest
        needs: [publish]
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: wordpress-plugin/package-lock.json

            - name: Install npm dependencies
              run: npm ci
              working-directory: wordpress-plugin

            - name: Build
              run: npm run build
              working-directory: wordpress-plugin

            - name: Install WP-CLI
              run: |
                  curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli-nightly.phar
                  chmod +x wp-cli-nightly.phar
                  sudo mv wp-cli-nightly.phar /usr/local/bin/wp

            - name: Install dist-archive command
              run: wp package install wp-cli/dist-archive-command

            - name: Build distribution zip
              run: wp dist-archive wordpress-plugin claudaborative-editing-plugin.zip

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release create "$GITHUB_REF_NAME" \
                    --title "$GITHUB_REF_NAME" \
                    --generate-notes \
                    claudaborative-editing-plugin.zip
