name: Publish

on:
    push:
        tags:
            - 'v*'

permissions:
    id-token: write
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci
            - run: npm --prefix wordpress-plugin ci
            - run: npm run typecheck
            - run: npm run build
            - run: npm test
            - run: npm publish
            - run: npm pack
            - uses: actions/upload-artifact@v4
              with:
                  name: npm-tarball
                  path: claudaborative-editing-*.tgz

