name: Canary Publish

on:
    push:
        branches: [main]
        tags-ignore: ['**']

concurrency:
    group: canary-${{ github.ref }}
    cancel-in-progress: true

permissions:
    id-token: write
    contents: read

jobs:
    canary:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci
            - run: npm --prefix wordpress-plugin ci

            - name: Compute canary version
              id: version
              run: |
                  CURRENT=$(node -p "require('./package.json').version")
                  NEXT_PATCH=$(node -p "
                    const [major, minor, patch] = '${CURRENT}'.split('.').map(Number);
                    \`\${major}.\${minor}.\${patch + 1}\`
                  ")
                  SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
                  CANARY_VERSION="${NEXT_PATCH}-canary.${SHORT_SHA}"
                  echo "canary_version=${CANARY_VERSION}" >> "$GITHUB_OUTPUT"
                  echo "Publishing canary version: ${CANARY_VERSION}"

            - name: Set canary version
              run: npm version "${{ steps.version.outputs.canary_version }}" --no-git-tag-version

            - run: npm run build
            - run: npm publish --tag canary
