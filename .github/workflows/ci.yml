name: Build & Test

on:
    push:
        branches: [main]
        tags-ignore: ['**']
    pull_request:

permissions:
    actions: read
    pull-requests: write

jobs:
    ci:
        name: Build & Test (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20, 22, 24]

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: npm ci
            - run: npm run typecheck
            - run: npm run lint
            - run: npm run build
            - run: npm test -- --coverage

            - name: Check TypeScript coverage
              if: matrix.node-version == 22
              uses: pento/lcov-coverage-check@v3
              with:
                  lcov-file: coverage/lcov.info
                  path: |
                      src/
                  ignore-patterns: |
                      **/types.ts
                  coverage-label: typescript
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    e2e:
        name: E2E (Node 22)
        runs-on: ubuntu-latest
        timeout-minutes: 45

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npm run test:e2e

    plugin-lint-php:
        name: Plugin PHP Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist
              working-directory: wordpress-plugin

            - name: Run PHPCS
              run: composer phpcs
              working-directory: wordpress-plugin

            - name: Run PHPStan
              run: composer phpstan
              working-directory: wordpress-plugin

    plugin-test-php:
        name: Plugin PHP Tests
        runs-on: ubuntu-latest
        needs: [plugin-lint-php]

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: |
                      package-lock.json
                      wordpress-plugin/package-lock.json

            - name: Install root npm dependencies
              run: npm ci

            - name: Install plugin npm dependencies
              run: npm ci
              working-directory: wordpress-plugin

            - name: Build plugin
              run: npm run build
              working-directory: wordpress-plugin

            - name: Run PHPUnit with coverage
              run: npm run test:php:coverage
              working-directory: wordpress-plugin

            - name: Convert Clover XML to LCOV
              uses: andstor/clover2lcov-action@v1
              with:
                  src: wordpress-plugin/coverage/clover.xml
                  dst: wordpress-plugin/coverage/lcov.info

            - name: Rewrite container paths in LCOV
              run: >-
                  sed -i
                  's|SF:/var/www/html/wp-content/plugins/claudaborative-editing/|SF:wordpress-plugin/|g'
                  wordpress-plugin/coverage/lcov.info

            - name: Check PHP coverage
              uses: pento/lcov-coverage-check@v3
              with:
                  lcov-file: wordpress-plugin/coverage/lcov.info
                  path: |
                      wordpress-plugin/includes/
                  coverage-label: plugin-php
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    plugin-test-js:
        name: Plugin JS Tests
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: wordpress-plugin/package-lock.json

            - name: Install plugin npm dependencies
              run: npm ci
              working-directory: wordpress-plugin

            - name: Run Jest with coverage
              run: npm run test:coverage
              working-directory: wordpress-plugin

            - name: Rewrite source paths in LCOV
              run: >-
                  sed -i
                  's|SF:src/|SF:wordpress-plugin/src/|g'
                  wordpress-plugin/coverage/js/lcov.info

            - name: Check JS coverage
              uses: pento/lcov-coverage-check@v3
              with:
                  lcov-file: wordpress-plugin/coverage/js/lcov.info
                  path: |
                      wordpress-plugin/src/
                  coverage-label: plugin-js
                  github-token: ${{ secrets.GITHUB_TOKEN }}
