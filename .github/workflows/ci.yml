name: Build & Test

on:
    push:
        branches: [main]
        tags-ignore: ['**']
    pull_request:

permissions:
    actions: read
    pull-requests: write

jobs:
    ci:
        name: Build & Test (Node ${{ matrix.node-version }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [20, 22, 24]

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - run: npm ci
            - run: npm run typecheck
            - run: npm run lint
            - run: npm run build
            - run: npm test -- --coverage

            - name: Check coverage
              if: matrix.node-version == 22
              uses: pento/lcov-coverage-check@v2
              with:
                  lcov-file: coverage/lcov.info
                  path: |
                      src/
                      wordpress-plugin/src/
                  ignore-patterns: |
                      **/types.ts
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    e2e:
        name: E2E (Node 22)
        runs-on: ubuntu-latest
        timeout-minutes: 45

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci
            - run: npx playwright install --with-deps chromium
            - run: npm run test:e2e

    plugin-lint-php:
        name: Plugin PHP Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist
              working-directory: wordpress-plugin

            - name: Run PHPCS
              run: composer phpcs
              working-directory: wordpress-plugin

    plugin-test-php:
        name: Plugin PHP Tests
        runs-on: ubuntu-latest
        needs: [plugin-lint-php]

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install root npm dependencies
              run: npm ci

            - name: Install plugin npm dependencies
              run: npm ci
              working-directory: wordpress-plugin

            - name: Build plugin
              run: npm run build
              working-directory: wordpress-plugin

            - name: Run PHPUnit
              run: npm run test:php
