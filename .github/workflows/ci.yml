name: Build & Test

on:
  push:
    branches: [main]
    tags-ignore: ['**']
  pull_request:

permissions:
  actions: read
  pull-requests: write

jobs:
  ci:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm test -- --coverage

      - name: Check coverage
        if: matrix.node-version == 22
        uses: pento/lcov-coverage-check@v2
        with:
          lcov-file: coverage/lcov.info
          path: src/
          ignore-patterns: |
            **/types.ts
          github-token: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: E2E (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Use latest pre-built Gutenberg for CI
        run: |
          LATEST_URL=$(gh api repos/WordPress/gutenberg/releases/latest --jq '.assets[] | select(.name == "gutenberg.zip") | .browser_download_url')
          cat > .wp-env.json <<WPENV
          {
            "\$schema": "https://schemas.wp.org/trunk/wp-env.json",
            "core": "WordPress/WordPress#master",
            "phpVersion": "8.5",
            "testsEnvironment": false,
            "plugins": ["$LATEST_URL"],
            "lifecycleScripts": {
              "afterStart": "npx wp-env run cli wp option update wp_collaboration_enabled 1"
            }
          }
          WPENV
        env:
          GH_TOKEN: ${{ github.token }}

      - run: npm run test:e2e
